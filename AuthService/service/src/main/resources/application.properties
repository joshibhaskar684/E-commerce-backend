spring.application.name=service



spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
server.forward-headers-strategy=framework



spring.jpa.hibernate.ddl-auto=update



spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



spring.datasource.url=${JDBC_DB_URL_FILE:${JDBC_DB_URL}}
spring.datasource.username=${JDBC_DB_USERNAME_FILE:${JDBC_DB_USERNAME}}
spring.datasource.password=${JDBC_DB_PASSWORD_FILE:${JDBC_DB_PASSWORD}}

jwt.sckey=${JWT_SECRET_KEY_FILE:${JWT_SECRET_KEY}}

spring.mail.host=${MAIL_HOST_FILE:${MAIL_HOST}}
spring.mail.port=${MAIL_PORT_FILE:${MAIL_PORT}}
spring.mail.username=${MAIL_USERNAME_FILE:${MAIL_USERNAME}}
spring.mail.password=${MAIL_PASSWORD_FILE:${MAIL_PASSWORD}}

razorpay.api.key=${RAZORPAY_API_KEY_FILE:${RAZORPAY_API_KEY}}
razorpay.api.secret=${RAZORPAY_API_SECRET_FILE:${RAZORPAY_API_SECRET}}


frontend_Url=${FRONTEND_URL_FILE:${FRONTEND_URL}}

redirect_URL=${FRONTEND_REDIRECT_URL}




logging.level.org.springframework.security=DEBUG

logging.level.root=INFO