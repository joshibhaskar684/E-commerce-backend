spring.application.name=products-service

server.port=8081
spring.mongodb.uri=${MANGO_DB_URI}

server.forward-headers-strategy=framework
# Eureka client to discover services
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Set default logging level
#logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
#logging.level.com.yourpackage=DEBUG

logging.level.org.apache.kafka.clients=ERROR

public_key=${RS256_PUBLIC_KEY}

spring.kafka.consumer.bootstrap-servers=${KAFKA_SERVER_PORT}
spring.kafka.consumer.group-id=product-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

#spring.kafka.topic.name=seller-events
logging.level.org.springframework.security=DEBUG
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}